name: Keep Streamlit App Awake 🚀

on:
  schedule:
    # Runs at 08:30 AM UTC every single day
    - cron: '30 8 * * *'
  workflow_dispatch: # Allows manual trigger testing

jobs:
  wake-streamlit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Automation Engine
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Headless Browser Interaction Session
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            const targetUrl = 'https://marketing-agent-crew.streamlit.app';
            console.log('Opening headless browser session at: ' + targetUrl);
            
            // Navigate to the app and wait until all network connections are idle
            await page.goto(targetUrl, { waitUntil: 'networkidle', timeout: 60000 });
            
            // Wait an additional 10 seconds to allow Streamlit WebSockets to completely handshake
            await page.waitForTimeout(10000);
            
            console.log('Page Title:', await page.title());
            
            // Check if the page contains the 'Wake up' button just in case it was already asleep
            const wakeButton = page.locator('button:has-text(\"Wake this app back up\")');
            if (await wakeButton.count() > 0) {
              console.log('🔄 App was sleeping! Simulating click on Wake Up button...');
              await wakeButton.click();
              // Give it 30 seconds to run the container boot sequence
              await page.waitForTimeout(30000);
            } else {
              console.log('✅ App was already awake. Session state refreshed successfully.');
            }
            
            await browser.close();
            console.log('🏁 Browser session closed safely.');
          })();
          "